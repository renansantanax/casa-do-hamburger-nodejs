version: "3.9"

services:
  postgres:
    image: postgres:18

    container_name: casa-do-hamburger-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: casa-do-hamburger

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4

    container_name: casa-do-hamburger-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: 1234

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  postgres_data:
